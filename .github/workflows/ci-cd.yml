name: CI/CD Pipeline

on:
  push:
    branches: [ main, Development ]
  pull_request:
    branches: [ main, Development ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        dotnet-quality: 'preview'

    - name: Restore dependencies
      run: dotnet restore CustomerResolutionApi/CustomerResolutionApi.csproj

    - name: Build API
      run: dotnet build CustomerResolutionApi/CustomerResolutionApi.csproj --no-restore --configuration Release

    - name: Build tests
      run: dotnet build CustomerResolutionApi.Tests/CustomerResolutionApi.Tests.csproj --configuration Release

    - name: Test
      run: dotnet test CustomerResolutionApi.Tests/CustomerResolutionApi.Tests.csproj --no-build --configuration Release --verbosity normal

  build-frontend:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: customer-resolution-ui/package-lock.json

    - name: Install dependencies
      working-directory: ./customer-resolution-ui
      run: npm ci

    - name: Build frontend
      working-directory: ./customer-resolution-ui
      run: npm run build

  release-readiness:
    runs-on: ubuntu-latest
    needs: [build-and-test, build-frontend]
    if: github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        dotnet-quality: 'preview'

    - name: Publish API
      run: dotnet publish CustomerResolutionApi/CustomerResolutionApi.csproj --configuration Release --output ./publish

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: api-publish
        path: ./publish

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: customer-resolution-ui/package-lock.json

    - name: Install frontend dependencies
      working-directory: ./customer-resolution-ui
      run: npm ci

    - name: Build frontend for production
      working-directory: ./customer-resolution-ui
      run: npm run build

    - name: Upload frontend artifact
      uses: actions/upload-artifact@v4
      with:
        name: frontend-build
        path: ./customer-resolution-ui/dist
