services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: CustomerResolutionDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "5000:80"
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=CustomerResolutionDb;Username=postgres;Password=postgres
      - Jwt__Key=YourSuperSecretKeyThatIsAtLeast32CharactersLong!
      - Jwt__Issuer=CustomerResolutionApi
      - Jwt__Audience=CustomerResolutionApp
      - Cors__AllowedOrigins__0=http://localhost:3000
    depends_on:
      - db

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  pgdata:
